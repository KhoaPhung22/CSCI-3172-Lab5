<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magical Inventory Management System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>Magical Inventory Management System</h1>
    </header>
    <main>
        <section id = "search-section">
            <h2>Search Inventory</h2>
            <input type="text" id="searchInput" placeholder="Search by name or type">
            <button id="searchBtn">Search</button>
            <button id="showAllBtn">Show All Items</button>
        </section>
        <section id="add-item-form">
            <h3>Add New Magical Item</h3>
            <input type="text" id="newName" placeholder="Item Name">
            <input type="text" id="newType" placeholder="Type (e.g., Potion, Wand)">
            <input type="number" id="newPrice" placeholder="Price">
            <input type="number" id="newQuantity" placeholder="Quantity">
            <textarea id="newDescription" placeholder="Description"></textarea>
            <button id="addBtn">Add to Inventory</button>
        </section>
        <hr>
        <section id="inventory-container">
            <h2>Current Stock</h2>
            <div id="displayArea">
                </div>
        </section>
        <section id="inventory-container">
            <div id="groupedDisplayArea">
                </div>
            <button id="groupBtn">Group by Category</button>
        </section>
        <section id="total-value-section">
            <h3>Total Inventory Value: $<span id="totalValue">0.00</span></h3>
        </section>
</main>

    <script src="js/script.js"></script>
</body>
</html>
