<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Lab 4</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <!-- Notification Overlay -->
    <div id="notification"></div>

    <div class="container">
        <h1>Create Account</h1>
        <p class="subtitle">Join our community today</p>

        <!-- novalidate to handle validation via JavaScript as requested -->
        <form id="registrationForm" novalidate>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="you@example.com" required>
                <div id="emailError" class="error-message"></div>
            </div>

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="johndoe" required>
                <div id="usernameError" class="error-message"></div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Min. 12 characters" required>
                <div id="passwordError" class="error-message"></div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Repeat password" required>
                <div id="confirmPasswordError" class="error-message"></div>
            </div>

            <button type="submit" class="btn">Register</button>
        </form>

        <div class="footer-link">
            Already have an account? <a href="login.html">Login here</a>
        </div>
    </div>

    <!-- Script as module to use imports -->
    <script type="module" src="js/register.js"></script>
</body>

</html>
