<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Recipe Recommender — Discover personalized recipes based on your ingredients and dietary preferences." />
  <title>Recipe Recommender</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Header-->
  <header class="site-header" role="banner">
    <div class="header-inner">
      <div class="brand">
        <span class="brand-icon" aria-hidden="true">🍽️</span>
        <h1 class="brand-name">Recipe<span class="accent">Recommender</span></h1>
      </div>
      <p class="brand-tagline">Tell us what you have — we'll tell you what to cook.</p>
    </div>
  </header>

  <!--Main-->
  <main id="main-content">

    <!-- Search Panel -->
    <section class="search-panel" aria-label="Recipe search">
      <div class="search-card">

        <!-- Ingredient Input -->
        <div class="field-group">
          <label for="ingredient-input" class="field-label">
            <span class="label-icon" aria-hidden="true">🥦</span>
            Ingredients you have
          </label>
          <div class="ingredient-input-row">
            <input
              type="text"
              id="ingredient-input"
              class="text-input"
              placeholder="e.g. tomato, cheese, basil…"
              autocomplete="off"
              aria-describedby="ingredient-hint"
            />
            <button id="add-ingredient-btn" class="btn btn-secondary" type="button" aria-label="Add ingredient">
              + Add
            </button>
          </div>
          <p id="ingredient-hint" class="field-hint">Press Enter or click + Add to add each ingredient</p>
          <div id="ingredient-pills" class="pill-container" role="list" aria-label="Added ingredients"></div>
        </div>

        <!-- Diet Filters -->
        <fieldset class="field-group diet-fieldset">
          <legend class="field-label">
            <span class="label-icon" aria-hidden="true">🥗</span>
            Dietary preference
          </legend>
          <div class="diet-grid">
            <label class="diet-option">
              <input type="radio" name="diet" value="" id="diet-none" checked />
              <span class="diet-chip">Any</span>
            </label>
            <label class="diet-option">
              <input type="radio" name="diet" value="vegetarian" id="diet-vegetarian" />
              <span class="diet-chip">🌿 Vegetarian</span>
            </label>
            <label class="diet-option">
              <input type="radio" name="diet" value="vegan" id="diet-vegan" />
              <span class="diet-chip">🌱 Vegan</span>
            </label>
            <label class="diet-option">
              <input type="radio" name="diet" value="gluten free" id="diet-gluten-free" />
              <span class="diet-chip">🌾 Gluten-Free</span>
            </label>
            <label class="diet-option">
              <input type="radio" name="diet" value="dairy free" id="diet-dairy-free" />
              <span class="diet-chip">🥛 Dairy-Free</span>
            </label>
          </div>
        </fieldset>

        <!-- Action Buttons -->
        <div class="action-row">
          <button id="search-btn" class="btn btn-primary" type="button">
            <span aria-hidden="true">🔍</span> Find Recipes
          </button>
          <button id="surprise-btn" class="btn btn-accent" type="button">
            <span aria-hidden="true">🎲</span> Surprise Me
          </button>
          <button id="clear-btn" class="btn btn-ghost" type="button">
            <span aria-hidden="true">✕</span> Clear
          </button>
        </div>

      </div>
    </section>

    <!-- Error / Status Banner -->
    <div
      id="status-banner"
      class="status-banner hidden"
      role="status"
      aria-live="polite"
      aria-atomic="true"
    ></div>

    <!-- Results Section -->
    <section
      id="results-section"
      class="results-section"
      aria-label="Recipe results"
      aria-live="polite"
    >
      <div id="results-grid" class="results-grid"></div>
    </section>

  </main>

  <!-- Recipe Detail Modal-->
  <dialog
    id="recipe-modal"
    class="recipe-modal"
    aria-modal="true"
    aria-labelledby="modal-title"
  >
    <div class="modal-inner">
      <button id="modal-close-btn" class="modal-close" type="button" aria-label="Close recipe details">✕</button>
      <div id="modal-content" class="modal-content"></div>
    </div>
  </dialog>

  <!--Footer -->
  <footer class="site-footer" role="contentinfo">
    <p>
      Powered by <a href="https://spoonacular.com/food-api" target="_blank" rel="noopener noreferrer">Spoonacular API</a>
      &nbsp;·&nbsp; CSCI 3172 Lab 5 &nbsp;·&nbsp; Winter 2026
    </p>
  </footer>

  <script type="module" src="js/main.js"></script>
</body>
</html>
